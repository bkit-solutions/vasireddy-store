name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "🚀 Starting deployment..."

            cd ~

            # Clone if app doesn't exist
            if [ ! -d "app" ]; then
              git clone https://github.com/bkit-solutions/vasireddy-store.git app
            fi

            cd app

            # Backup current version (for rollback)
            cp -r . ../app_backup_$(date +%s)

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Restore env
            cp ~/.env .env

            # Install deps
            npm install

            # Build app
            npm run build

            # Restart app safely
            pm2 restart vr-ecom || pm2 start npm --name "vr-ecom" -- start

            # Save PM2 process list
            pm2 save

            echo "✅ Deployment completed!"
